Name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. تسجيل الدخول إلى Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # يفضل استخدام Token وليس الباسورد العادي

      # 2. بناء الصورة ورفعها إلى Docker Hub
      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/smart-frontend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-frontend:latest

      # 3. تسجيل الدخول إلى Azure (مطلوب للوصول إلى AKS)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. ضبط سياق kubectl ليتصل بـ AKS
      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      # 5. عمل Deploy على AKS (تحديث الـ Pods بالصورة الجديدة)
      - name: Deploy to AKS
        run: |
          kubectl rollout restart deployment/smart-frontend-deployment
