<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/icon.png.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>University Management System</title>
    <script>
      // Apply theme early to avoid flash of wrong theme
      (function () {
        try {
          var stored = localStorage.getItem('theme-storage');
          var theme = null;
          if (stored) {
            var parsed = JSON.parse(stored);
            theme = parsed && parsed.state && parsed.state.theme;
          }
          if (theme !== 'dark' && theme !== 'light') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
      // Apply language direction early to avoid LTR/RTL flash
      (function () {
        try {
          var lang = localStorage.getItem('app-language');
          if (lang !== 'ar' && lang !== 'en') {
            lang = (navigator.language || 'en').toLowerCase().indexOf('ar') === 0 ? 'ar' : 'en';
          }
          document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
          document.documentElement.setAttribute('lang', lang);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
